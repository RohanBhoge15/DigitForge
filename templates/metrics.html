<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Metrics Comparison Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <style>
        .metrics-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .metrics-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .metrics-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        
        .metric-card h3 {
            margin-top: 0;
            color: #667eea;
            font-size: 1.2em;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .metric-label {
            color: #666;
            font-size: 0.9em;
        }
        
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chart-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        
        .insights-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 30px;
            margin-top: 40px;
        }
        
        .insights-section h2 {
            margin-top: 0;
        }
        
        .insight-item {
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .insight-item strong {
            color: #ffd700;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #667eea;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="metrics-container">
        <a href="/" class="back-button">← Back to Main</a>
        
        <div class="metrics-header">
            <h1>📊 Comprehensive Model Metrics Dashboard</h1>
            <p>Detailed comparison of CNN, Custom Neural Network, and ML Models</p>
        </div>
        
        <div id="loadingMessage" class="loading">
            Loading metrics data...
        </div>
        
        <div id="errorMessage" class="error" style="display: none;"></div>
        
        <div id="metricsContent" style="display: none;">
            <!-- Summary Cards -->
            <div class="metrics-grid" id="summaryCards"></div>
            
            <!-- Charts -->
            <div class="chart-container">
                <div class="chart-title">🎯 Test Accuracy Comparison</div>
                <div id="accuracyChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">⚡ Prediction Speed Comparison</div>
                <div id="speedChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">⏱️ Training Time Comparison</div>
                <div id="trainingTimeChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">💾 Model Size Comparison</div>
                <div id="modelSizeChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">📈 Accuracy vs Speed Trade-off</div>
                <div id="tradeoffChart"></div>
            </div>
            
            <!-- Insights Section -->
            <div class="insights-section" id="insightsSection"></div>
        </div>
    </div>
    
    <script>
        // Load and display metrics
        async function loadMetrics() {
            try {
                const response = await fetch('/metrics');
                const data = await response.json();
                
                if (!data.success) {
                    showError(data.error || 'Failed to load metrics');
                    return;
                }
                
                const metrics = data.metrics;
                displayMetrics(metrics);
                
            } catch (error) {
                showError('Error loading metrics: ' + error.message);
            }
        }
        
        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
        }
        
        function displayMetrics(metrics) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('metricsContent').style.display = 'block';
            
            // Create summary cards
            createSummaryCards(metrics);
            
            // Create charts
            createAccuracyChart(metrics.test_accuracy);
            createSpeedChart(metrics.prediction_speed);
            createTrainingTimeChart(metrics.training_time);
            createModelSizeChart(metrics.model_size);
            createTradeoffChart(metrics.test_accuracy, metrics.prediction_speed);
            
            // Generate insights
            generateInsights(metrics);
        }
        
        function createSummaryCards(metrics) {
            const container = document.getElementById('summaryCards');
            
            // Best Accuracy
            const accuracyData = Object.entries(metrics.test_accuracy).filter(([k,v]) => v !== null);
            if (accuracyData.length > 0) {
                const best = accuracyData.reduce((a, b) => a[1] > b[1] ? a : b);
                container.innerHTML += `
                    <div class="metric-card">
                        <h3>🏆 Best Accuracy</h3>
                        <div class="metric-value">${(best[1] * 100).toFixed(2)}%</div>
                        <div class="metric-label">${best[0]}</div>
                    </div>
                `;
            }
            
            // Fastest Prediction
            const speedData = Object.entries(metrics.prediction_speed).filter(([k,v]) => v !== null);
            if (speedData.length > 0) {
                const fastest = speedData.reduce((a, b) => a[1] < b[1] ? a : b);
                container.innerHTML += `
                    <div class="metric-card">
                        <h3>⚡ Fastest Prediction</h3>
                        <div class="metric-value">${fastest[1].toFixed(2)}ms</div>
                        <div class="metric-label">${fastest[0]}</div>
                    </div>
                `;
            }
            
            // Fastest Training
            const trainData = Object.entries(metrics.training_time).filter(([k,v]) => v !== null);
            if (trainData.length > 0) {
                const fastestTrain = trainData.reduce((a, b) => a[1] < b[1] ? a : b);
                container.innerHTML += `
                    <div class="metric-card">
                        <h3>🏋️ Fastest Training</h3>
                        <div class="metric-value">${fastestTrain[1].toFixed(1)}s</div>
                        <div class="metric-label">${fastestTrain[0]}</div>
                    </div>
                `;
            }
        }

        function createAccuracyChart(accuracyData) {
            const data = Object.entries(accuracyData).filter(([k,v]) => v !== null);
            const trace = {
                x: data.map(d => d[0]),
                y: data.map(d => d[1] * 100),
                type: 'bar',
                marker: {
                    color: data.map(d => d[0].includes('CNN') ? '#FF6B6B' :
                                        d[0].includes('Custom') ? '#4ECDC4' : '#95E1D3')
                },
                text: data.map(d => (d[1] * 100).toFixed(2) + '%'),
                textposition: 'outside'
            };

            const layout = {
                yaxis: { title: 'Accuracy (%)', range: [0, 100] },
                xaxis: { tickangle: -45 },
                margin: { b: 150 }
            };

            Plotly.newPlot('accuracyChart', [trace], layout);
        }

        function createSpeedChart(speedData) {
            const data = Object.entries(speedData).filter(([k,v]) => v !== null);
            const trace = {
                x: data.map(d => d[0]),
                y: data.map(d => d[1]),
                type: 'bar',
                marker: {
                    color: data.map(d => d[0].includes('CNN') ? '#FF6B6B' :
                                        d[0].includes('Custom') ? '#4ECDC4' : '#95E1D3')
                },
                text: data.map(d => d[1].toFixed(2) + 'ms'),
                textposition: 'outside'
            };

            const layout = {
                yaxis: { title: 'Time (ms) - Lower is Better' },
                xaxis: { tickangle: -45 },
                margin: { b: 150 }
            };

            Plotly.newPlot('speedChart', [trace], layout);
        }

        function createTrainingTimeChart(trainData) {
            const data = Object.entries(trainData).filter(([k,v]) => v !== null);
            const trace = {
                x: data.map(d => d[0]),
                y: data.map(d => d[1]),
                type: 'bar',
                marker: {
                    color: data.map(d => d[0].includes('CNN') ? '#FF6B6B' :
                                        d[0].includes('Custom') ? '#4ECDC4' : '#95E1D3')
                },
                text: data.map(d => d[1].toFixed(1) + 's'),
                textposition: 'outside'
            };

            const layout = {
                yaxis: { title: 'Time (seconds) - Lower is Better' },
                xaxis: { tickangle: -45 },
                margin: { b: 150 }
            };

            Plotly.newPlot('trainingTimeChart', [trace], layout);
        }

        function createModelSizeChart(sizeData) {
            const data = Object.entries(sizeData).filter(([k,v]) => v !== null);
            const trace = {
                x: data.map(d => d[0]),
                y: data.map(d => d[1]),
                type: 'bar',
                marker: {
                    color: data.map(d => d[0].includes('CNN') ? '#FF6B6B' :
                                        d[0].includes('Custom') ? '#4ECDC4' : '#95E1D3')
                },
                text: data.map(d => d[1].toFixed(2) + 'MB'),
                textposition: 'outside'
            };

            const layout = {
                yaxis: { title: 'Size (MB) - Lower is Better' },
                xaxis: { tickangle: -45 },
                margin: { b: 150 }
            };

            Plotly.newPlot('modelSizeChart', [trace], layout);
        }

        function createTradeoffChart(accuracyData, speedData) {
            const models = Object.keys(accuracyData).filter(k =>
                accuracyData[k] !== null && speedData[k] !== null
            );

            const trace = {
                x: models.map(m => speedData[m]),
                y: models.map(m => accuracyData[m] * 100),
                mode: 'markers+text',
                type: 'scatter',
                text: models,
                textposition: 'top center',
                marker: {
                    size: 15,
                    color: models.map(m => m.includes('CNN') ? '#FF6B6B' :
                                          m.includes('Custom') ? '#4ECDC4' : '#95E1D3')
                }
            };

            const layout = {
                xaxis: { title: 'Prediction Speed (ms) - Lower is Better' },
                yaxis: { title: 'Accuracy (%) - Higher is Better' },
                hovermode: 'closest'
            };

            Plotly.newPlot('tradeoffChart', [trace], layout);
        }

        function generateInsights(metrics) {
            const container = document.getElementById('insightsSection');
            let insights = '<h2>🔍 Key Insights & Analysis</h2>';

            // Compare CNN vs Custom NN
            const cnnAcc = metrics.test_accuracy['CNN'];
            const customAcc = metrics.test_accuracy['Custom Neural Network'];
            const cnnSpeed = metrics.prediction_speed['CNN'];
            const customSpeed = metrics.prediction_speed['Custom Neural Network'];

            if (cnnAcc && customAcc) {
                const accDiff = ((cnnAcc - customAcc) * 100).toFixed(2);
                insights += `
                    <div class="insight-item">
                        <strong>CNN vs Custom Neural Network:</strong><br>
                        ${cnnAcc > customAcc ?
                            `CNN achieves ${accDiff}% higher accuracy than the custom implementation.` :
                            `Custom NN achieves ${Math.abs(accDiff)}% higher accuracy than CNN.`}
                    </div>
                `;
            }

            if (cnnSpeed && customSpeed) {
                const speedRatio = (cnnSpeed / customSpeed).toFixed(2);
                insights += `
                    <div class="insight-item">
                        <strong>Prediction Speed:</strong><br>
                        ${customSpeed < cnnSpeed ?
                            `Custom NN is ${speedRatio}x faster than CNN for predictions.` :
                            `CNN is ${(1/speedRatio).toFixed(2)}x faster than Custom NN for predictions.`}
                    </div>
                `;
            }

            // Best overall model
            const accuracyData = Object.entries(metrics.test_accuracy).filter(([k,v]) => v !== null);
            if (accuracyData.length > 0) {
                const best = accuracyData.reduce((a, b) => a[1] > b[1] ? a : b);
                insights += `
                    <div class="insight-item">
                        <strong>Best Overall Model:</strong><br>
                        ${best[0]} achieves the highest accuracy at ${(best[1] * 100).toFixed(2)}%
                    </div>
                `;
            }

            // Custom NN advantages
            insights += `
                <div class="insight-item">
                    <strong>Custom Neural Network Advantages:</strong><br>
                    • Full control over architecture and training process<br>
                    • Educational value - understand every component<br>
                    • Lightweight implementation with minimal dependencies<br>
                    • Fast prediction speed due to simple architecture
                </div>
            `;

            // CNN advantages
            insights += `
                <div class="insight-item">
                    <strong>CNN Advantages:</strong><br>
                    • State-of-the-art accuracy for image recognition<br>
                    • Automatic feature extraction through convolution layers<br>
                    • Spatial hierarchy learning<br>
                    • Better generalization on complex patterns
                </div>
            `;

            container.innerHTML = insights;
        }

        // Load metrics on page load
        window.addEventListener('load', loadMetrics);
    </script>
</body>
</html>
